#==============================================================================
# Flink & Web Frontend
#==============================================================================

# Flink REST 地址指向 JobManager 服務名稱
# docker 應該要用 jobmanager
flink.rest.address: jobmanager
flink.rest.port: 8081

# Nexmark 應用程式必須知道要使用哪個 Workload Suite 100m，或是 datagen
# 產生資料 job - datagen
# 執行q7 - 100m   (是設定上限嗎？
nexmark.workload.suite: 100m

# Metric Reporter (Nexmark 內部使用的，與 Kafka Reporter 無關)
nexmark.metric.reporter.host: jobmanager
nexmark.metric.reporter.port: 9098

#==============================================================================
# Workload Suite Definition (100m)
#==============================================================================

# nexmark.workload.suite.100m.events.num: 5000000
# 不能同時設數量和時間 先以時間為主，insert_kafka只能使用數據量 num
nexmark.metric.monitor.duration: 3600s
# nexmark.workload.suite.100m.tps: 50000
# 包含 q7 的查詢列表
nexmark.workload.suite.100m.queries: "q0,q1,q2,q3,q4,q5,q7,q8,q9,q10,q11,q12,q13,q14,q15,q16,q17,q18,q19,q20,q21,q22"
nexmark.workload.suite.100m.warmup.duration: 60s
nexmark.workload.suite.100m.warmup.events.num: 100000000
nexmark.workload.suite.100m.warmup.tps: 50000


#==============================================================================
# Workload for data generation
# 提交 insert.sql job 來產生數據
#==============================================================================

nexmark.workload.suite.datagen.tps: 50000
nexmark.workload.suite.datagen.queries: "generate_dataset"
nexmark.workload.suite.datagen.queries.cep: "generate_dataset"
nexmark.workload.suite.datagen.events.num: 1000000000

#==============================================================================
# Kafka config
#==============================================================================

# Kafka Bootstrap Servers 指向 Docker 服務名稱
kafka.bootstrap.servers: kafka:9092

# ==============================================================================
# Kafka Topic Configuration
# ==============================================================================
nexmark.person.topic: nexmark-events
nexmark.auction.topic: nexmark-events
nexmark.bid.topic: nexmark-events